<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="0.56" stop-color="#EEF5FF"/>
      <stop offset="1" stop-color="#DCEBFF"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1267FF"/>
      <stop offset="1" stop-color="#0046B8"/>
    </linearGradient>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="30" flood-color="#1267FF" flood-opacity="0.16"/>
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#05070A" flood-opacity="0.16"/>
    </filter>
    <filter id="textShadow" x="-10%" y="-80%" width="120%" height="260%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#05070A" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#1267FF" flood-opacity="0.28"/>
    </filter>
    <filter id="glassShadow" x="-30%" y="-80%" width="160%" height="260%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#1267FF" flood-opacity="0.14"/>
      <feDropShadow dx="0" dy="2" stdDeviation="9" flood-color="#05070A" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 800 42px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #101827; }
      .sub { font: 500 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #61708A; }
      .label { font: 800 22px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #101827; }
      .note { font: 500 15px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #6B7890; }
      .en { font: 700 26px Arial, sans-serif; fill: #F7FAFF; }
      .zh { font: 900 42px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #BFD8FF; }
      .ui { font: 700 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #F7FAFF; }
      .small { font: 700 14px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #7B8DAA; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- soft product-page backdrop -->
  <g opacity="0.74">
    <rect x="0" y="0" width="1600" height="88" fill="#FFFFFF"/>
    <rect x="0" y="86" width="1600" height="1" fill="#D9E7FA"/>
    <path d="M70 52 C88 23 108 23 126 52 C108 42 88 42 70 52Z" fill="#1267FF"/>
    <text x="146" y="49" font-family="Microsoft YaHei, Arial" font-size="25" font-weight="800" fill="#1267FF">Verba</text>
    <rect x="86" y="186" width="250" height="42" rx="8" fill="#1267FF" opacity="0.12"/>
    <rect x="86" y="254" width="480" height="26" rx="8" fill="#1267FF" opacity="0.18"/>
    <rect x="86" y="294" width="390" height="24" rx="8" fill="#FFD85A" opacity="0.28"/>
    <rect x="86" y="356" width="1340" height="360" rx="18" fill="#FFFFFF" opacity="0.75"/>
    <rect x="128" y="416" width="490" height="22" rx="8" fill="#CDD9EA"/>
    <rect x="128" y="466" width="780" height="18" rx="7" fill="#DFE8F5"/>
    <rect x="128" y="506" width="920" height="18" rx="7" fill="#DFE8F5"/>
    <rect x="128" y="546" width="820" height="18" rx="7" fill="#DFE8F5"/>
    <circle cx="1205" cy="526" r="128" fill="#1267FF" opacity="0.08"/>
    <rect x="1110" y="430" width="270" height="190" rx="24" fill="#F2F7FF"/>
  </g>

  <text x="80" y="126" class="title">Verba 歌词式透明悬浮 UI</text>
  <text x="82" y="160" class="sub">无黑框、小悬浮入口、桌面歌词字幕、悬停轻控制、修正高亮</text>
  <rect x="80" y="184" width="82" height="5" rx="2.5" fill="#1267FF"/>
  <rect x="168" y="184" width="48" height="5" rx="2.5" fill="#FFD85A"/>

  <!-- State 1 -->
  <g transform="translate(96 244)">
    <text x="0" y="0" class="label">01 小悬浮入口</text>
    <text x="0" y="30" class="note">打开后只出现一个胶囊入口，不挡视频内容</text>
    <g transform="translate(96 92)" filter="url(#glassShadow)">
      <rect x="0" y="0" width="206" height="58" rx="29" fill="#FFFFFF" fill-opacity="0.18" stroke="#BFD8FF" stroke-opacity="0.68"/>
      <circle cx="34" cy="29" r="22" fill="url(#blue)"/>
      <path d="M29 19 L45 29 L29 39 Z" fill="#F7FAFF"/>
      <text x="70" y="36" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#F7FAFF" filter="url(#textShadow)">Verba</text>
    </g>
  </g>

  <!-- State 2 -->
  <g transform="translate(524 244)">
    <text x="0" y="0" class="label">02 监听中：歌词字幕</text>
    <text x="0" y="30" class="note">不使用大容器，靠文字阴影和蓝色弱辉光保证可读</text>
    <g transform="translate(-20 78)">
      <text x="250" y="46" text-anchor="middle" class="en" filter="url(#textShadow)">"The model uses attention to align tokens."</text>
      <text x="250" y="106" text-anchor="middle" class="zh" filter="url(#textShadow)">该模型使用注意力机制来对齐词元。</text>
      <circle cx="198" cy="148" r="5" fill="#1267FF"/>
      <text x="214" y="154" class="small" fill="#BFD8FF">Listening</text>
    </g>
  </g>

  <!-- State 3 -->
  <g transform="translate(96 596)">
    <text x="0" y="0" class="label">03 悬停轻控制条</text>
    <text x="0" y="30" class="note">鼠标悬停才展开，控制条是毛玻璃，不是黑色工具窗</text>
    <g transform="translate(0 78)">
      <text x="330" y="42" text-anchor="middle" class="en" filter="url(#textShadow)">"The model uses attention to align tokens."</text>
      <text x="330" y="102" text-anchor="middle" class="zh" filter="url(#textShadow)">该模型使用注意力机制来对齐词元。</text>
      <g transform="translate(135 136)" filter="url(#glassShadow)">
        <rect x="0" y="0" width="390" height="54" rx="27" fill="#FFFFFF" fill-opacity="0.16" stroke="#BFD8FF" stroke-opacity="0.48"/>
        <text x="28" y="34" class="ui">🎧 系统音频</text>
        <circle cx="154" cy="27" r="4" fill="#1267FF"/>
        <text x="170" y="34" class="ui">5条</text>
        <text x="236" y="34" class="ui">A-</text>
        <text x="284" y="34" class="ui">A+</text>
        <circle cx="346" cy="27" r="18" fill="#EF3B3A"/>
        <rect x="339" y="20" width="14" height="14" rx="2" fill="#F7FAFF"/>
      </g>
    </g>
  </g>

  <!-- State 4 -->
  <g transform="translate(904 596)">
    <text x="0" y="0" class="label">04 修正反馈</text>
    <text x="0" y="30" class="note">只高亮被修正文字，不闪整个屏幕</text>
    <g transform="translate(0 92)">
      <text x="260" y="34" text-anchor="middle" class="en" filter="url(#textShadow)">"Downward spiral."</text>
      <text x="260" y="96" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="46" font-weight="900" fill="#FFD85A" filter="url(#textShadow)">螺旋式下降。 ✦</text>
      <rect x="150" y="112" width="220" height="5" rx="2.5" fill="#FFD85A"/>
      <text x="260" y="150" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="18" font-weight="700" fill="#8A94A6">原译：向下螺旋。</text>
    </g>
  </g>

  <!-- bottom palette -->
  <g transform="translate(80 912)">
    <text x="0" y="0" class="small">Palette</text>
    <g transform="translate(0 18)">
      <rect x="0" y="0" width="96" height="28" rx="8" fill="#1267FF"/>
      <rect x="110" y="0" width="96" height="28" rx="8" fill="#BFD8FF"/>
      <rect x="220" y="0" width="96" height="28" rx="8" fill="#F7FAFF" stroke="#D8E4F4"/>
      <rect x="330" y="0" width="96" height="28" rx="8" fill="#FFD85A"/>
      <rect x="440" y="0" width="96" height="28" rx="8" fill="#EF3B3A"/>
      <rect x="550" y="0" width="96" height="28" rx="8" fill="#05070A"/>
    </g>
  </g>
</svg>
