<svg width="1800" height="1280" viewBox="0 0 1800 1280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1800" y2="1280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="0.55" stop-color="#EEF5FF"/>
      <stop offset="1" stop-color="#E4EEFF"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#172033"/>
      <stop offset="1" stop-color="#0A0F1A"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1267FF"/>
      <stop offset="1" stop-color="#0046B8"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1267FF" flood-opacity="0.11"/>
      <feDropShadow dx="0" dy="3" stdDeviation="10" flood-color="#10213D" flood-opacity="0.10"/>
    </filter>
    <filter id="floatShadow" x="-40%" y="-70%" width="180%" height="240%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#05070A" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#1267FF" flood-opacity="0.22"/>
    </filter>
    <filter id="textShadow" x="-20%" y="-80%" width="140%" height="260%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#05070A" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#1267FF" flood-opacity="0.26"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10" stroke="#1267FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .h1 { font: 900 44px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #101827; }
      .h2 { font: 800 22px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #101827; }
      .body { font: 500 16px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #5C6D86; }
      .step { font: 900 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #1267FF; }
      .ui { font: 700 14px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #F7FAFF; }
      .uiMuted { font: 600 12px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #91A6C7; }
      .en { font: 700 15px Arial, sans-serif; fill: #F7FAFF; }
      .zh { font: 900 24px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #BFD8FF; }
      .dashTitle { font: 900 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #101827; }
      .dashText { font: 600 12px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #61708A; }
      .dashNum { font: 900 26px Arial, sans-serif; fill: #1267FF; }
    </style>
  </defs>

  <rect width="1800" height="1280" fill="url(#pageBg)"/>

  <text x="72" y="82" class="h1">Verba 全局 UI 步骤图</text>
  <text x="74" y="116" class="body">结构：小按钮入口 → 歌词式小框字幕 → 悬停控制 → 数据控制台 → 修正/停止/回到小入口</text>
  <rect x="72" y="140" width="92" height="5" rx="2.5" fill="#1267FF"/>
  <rect x="174" y="140" width="58" height="5" rx="2.5" fill="#FFD85A"/>

  <!-- Screen component helper panels -->
  <!-- Step 1 -->
  <g transform="translate(72 190)" filter="url(#cardShadow)">
    <rect width="500" height="300" rx="20" fill="#FFFFFF"/>
    <text x="28" y="42" class="step">Step 01</text>
    <text x="112" y="42" class="h2">看板/视频打开后</text>
    <text x="28" y="70" class="body">只显示一个小悬浮按钮，不占画面。</text>
    <g transform="translate(28 94)">
      <rect width="444" height="168" rx="14" fill="url(#screenBg)"/>
      <rect x="28" y="28" width="158" height="16" rx="6" fill="#EAF3FF" opacity="0.13"/>
      <rect x="28" y="56" width="240" height="12" rx="5" fill="#EAF3FF" opacity="0.08"/>
      <rect x="272" y="38" width="106" height="86" rx="14" fill="#EAF3FF" opacity="0.07"/>
      <g transform="translate(176 118)" filter="url(#floatShadow)">
        <rect width="126" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.18" stroke="#BFD8FF" stroke-opacity="0.55"/>
        <circle cx="23" cy="20" r="15" fill="url(#blue)"/>
        <path d="M19 13 L29 20 L19 27 Z" fill="#F7FAFF"/>
        <text x="45" y="26" class="ui">Verba</text>
      </g>
    </g>
  </g>

  <!-- Step 2 -->
  <g transform="translate(650 190)" filter="url(#cardShadow)">
    <rect width="500" height="300" rx="20" fill="#FFFFFF"/>
    <text x="28" y="42" class="step">Step 02</text>
    <text x="112" y="42" class="h2">点击小按钮开始监听</text>
    <text x="28" y="70" class="body">按钮收起，出现歌词式小框字幕。</text>
    <g transform="translate(28 94)">
      <rect width="444" height="168" rx="14" fill="url(#screenBg)"/>
      <g transform="translate(54 92)" filter="url(#floatShadow)">
        <rect width="336" height="72" rx="10" fill="#05070A" fill-opacity="0.18" stroke="#BFD8FF" stroke-opacity="0.34"/>
        <text x="168" y="24" text-anchor="middle" class="en" filter="url(#textShadow)">"The model uses attention."</text>
        <text x="168" y="53" text-anchor="middle" class="zh" filter="url(#textShadow)">该模型使用注意力机制。</text>
      </g>
      <circle cx="218" cy="82" r="5" fill="#12C76A"/>
      <text x="232" y="87" class="uiMuted">Listening</text>
    </g>
  </g>

  <!-- Step 3 -->
  <g transform="translate(1228 190)" filter="url(#cardShadow)">
    <rect width="500" height="300" rx="20" fill="#FFFFFF"/>
    <text x="28" y="42" class="step">Step 03</text>
    <text x="112" y="42" class="h2">鼠标悬停字幕小框</text>
    <text x="28" y="70" class="body">展开轻控制条，只给高频操作。</text>
    <g transform="translate(28 94)">
      <rect width="444" height="168" rx="14" fill="url(#screenBg)"/>
      <g transform="translate(54 64)" filter="url(#floatShadow)">
        <rect width="336" height="62" rx="10" fill="#05070A" fill-opacity="0.16" stroke="#BFD8FF" stroke-opacity="0.32"/>
        <text x="168" y="22" text-anchor="middle" class="en" filter="url(#textShadow)">"The model uses attention."</text>
        <text x="168" y="48" text-anchor="middle" class="zh" filter="url(#textShadow)">该模型使用注意力机制。</text>
      </g>
      <g transform="translate(72 134)" filter="url(#floatShadow)">
        <rect width="300" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.18" stroke="#BFD8FF" stroke-opacity="0.42"/>
        <text x="22" y="25" class="ui">🎧 系统音频</text>
        <text x="130" y="25" class="ui">A-</text>
        <text x="170" y="25" class="ui">A+</text>
        <circle cx="238" cy="19" r="13" fill="#1267FF"/>
        <text x="234" y="25" class="ui">↗</text>
        <circle cx="274" cy="19" r="13" fill="#EF3B3A"/>
        <rect x="269" y="14" width="10" height="10" rx="2" fill="#F7FAFF"/>
      </g>
    </g>
  </g>

  <!-- arrows row 1 -->
  <path d="M590 340 H628" stroke="#1267FF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1168 340 H1206" stroke="#1267FF" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Step 4 dashboard -->
  <g transform="translate(72 570)" filter="url(#cardShadow)">
    <rect width="790" height="450" rx="20" fill="#FFFFFF"/>
    <text x="28" y="44" class="step">Step 04</text>
    <text x="112" y="44" class="h2">点击 ↗ 打开数据控制台</text>
    <text x="28" y="72" class="body">控制台用于看状态、改设置、处理异常；不常驻遮挡视频。</text>

    <g transform="translate(28 104)">
      <rect width="736" height="312" rx="16" fill="#F7FAFF" stroke="#D6E5FA"/>
      <rect x="0" y="0" width="736" height="54" rx="16" fill="#FFFFFF"/>
      <text x="24" y="35" class="dashTitle">Verba 数据控制台</text>
      <rect x="604" y="14" width="92" height="28" rx="14" fill="#1267FF"/>
      <text x="629" y="33" class="ui">收起</text>

      <g transform="translate(24 78)">
        <rect width="154" height="86" rx="12" fill="#FFFFFF" stroke="#DCE8F7"/>
        <text x="18" y="28" class="dashText">会话时长</text>
        <text x="18" y="62" class="dashNum">08:42</text>
      </g>
      <g transform="translate(196 78)">
        <rect width="154" height="86" rx="12" fill="#FFFFFF" stroke="#DCE8F7"/>
        <text x="18" y="28" class="dashText">端到端延迟</text>
        <text x="18" y="62" class="dashNum">2.8s</text>
      </g>
      <g transform="translate(368 78)">
        <rect width="154" height="86" rx="12" fill="#FFFFFF" stroke="#DCE8F7"/>
        <text x="18" y="28" class="dashText">字幕条数</text>
        <text x="18" y="62" class="dashNum">37</text>
      </g>
      <g transform="translate(540 78)">
        <rect width="154" height="86" rx="12" fill="#FFFFFF" stroke="#DCE8F7"/>
        <text x="18" y="28" class="dashText">修正次数</text>
        <text x="18" y="62" class="dashNum">5</text>
      </g>

      <g transform="translate(24 190)">
        <text x="0" y="0" class="dashTitle">音频源</text>
        <rect x="0" y="18" width="214" height="38" rx="19" fill="#EAF3FF"/>
        <circle cx="25" cy="37" r="6" fill="#12C76A"/>
        <text x="42" y="43" class="dashText">WASAPI 系统音频</text>
      </g>
      <g transform="translate(278 190)">
        <text x="0" y="0" class="dashTitle">字幕样式</text>
        <rect x="0" y="18" width="54" height="38" rx="19" fill="#FFFFFF" stroke="#DCE8F7"/>
        <text x="18" y="43" class="dashText">A-</text>
        <rect x="66" y="18" width="54" height="38" rx="19" fill="#1267FF"/>
        <text x="83" y="43" class="ui">A+</text>
        <rect x="132" y="18" width="136" height="38" rx="19" fill="#FFFFFF" stroke="#DCE8F7"/>
        <text x="156" y="43" class="dashText">透明度 18%</text>
      </g>
      <g transform="translate(568 190)">
        <text x="0" y="0" class="dashTitle">操作</text>
        <rect x="0" y="18" width="82" height="38" rx="19" fill="#EF3B3A"/>
        <text x="24" y="43" class="ui">停止</text>
        <rect x="94" y="18" width="82" height="38" rx="19" fill="#FFFFFF" stroke="#DCE8F7"/>
        <text x="117" y="43" class="dashText">清空</text>
      </g>
    </g>
  </g>

  <!-- Step 5 correction -->
  <g transform="translate(946 570)" filter="url(#cardShadow)">
    <rect width="350" height="450" rx="20" fill="#FFFFFF"/>
    <text x="28" y="44" class="step">Step 05</text>
    <text x="112" y="44" class="h2">修正时</text>
    <text x="28" y="72" class="body">只高亮当前句，不打断观看。</text>
    <g transform="translate(28 126)">
      <rect width="294" height="210" rx="14" fill="url(#screenBg)"/>
      <g transform="translate(24 78)" filter="url(#floatShadow)">
        <rect width="246" height="84" rx="10" fill="#05070A" fill-opacity="0.16" stroke="#FFD85A" stroke-opacity="0.52"/>
        <text x="123" y="26" text-anchor="middle" class="en" filter="url(#textShadow)">"Downward spiral."</text>
        <text x="123" y="58" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="27" font-weight="900" fill="#FFD85A" filter="url(#textShadow)">螺旋式下降 ✦</text>
        <rect x="66" y="68" width="112" height="3" rx="1.5" fill="#FFD85A"/>
      </g>
    </g>
    <text x="28" y="388" class="body">旧译文 1.5 秒淡出；控制台记录 correction。</text>
  </g>

  <!-- Step 6 stop -->
  <g transform="translate(1374 570)" filter="url(#cardShadow)">
    <rect width="350" height="450" rx="20" fill="#FFFFFF"/>
    <text x="28" y="44" class="step">Step 06</text>
    <text x="112" y="44" class="h2">停止/收起后</text>
    <text x="28" y="72" class="body">回到小入口，可再次开始。</text>
    <g transform="translate(28 126)">
      <rect width="294" height="210" rx="14" fill="url(#screenBg)"/>
      <g transform="translate(84 154)" filter="url(#floatShadow)">
        <rect width="126" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.18" stroke="#BFD8FF" stroke-opacity="0.55"/>
        <circle cx="23" cy="20" r="15" fill="url(#blue)"/>
        <path d="M19 13 L29 20 L19 27 Z" fill="#F7FAFF"/>
        <text x="45" y="26" class="ui">Verba</text>
      </g>
    </g>
    <text x="28" y="388" class="body">停止后不上传音频；可选择保留最近一句。</text>
  </g>

  <!-- arrows lower -->
  <path d="M1478 490 V548" stroke="#1267FF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1228 795 H1328" stroke="#1267FF" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M862 795 H922" stroke="#1267FF" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- principles -->
  <g transform="translate(72 1090)">
    <rect width="1652" height="128" rx="20" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="28" y="42" class="h2">设计原则</text>
    <text x="28" y="78" class="body">1. 常驻层只放“字幕”，控制层按需展开。</text>
    <text x="430" y="78" class="body">2. 歌词小框允许轻微毛玻璃，但不做黑色大框。</text>
    <text x="900" y="78" class="body">3. 数据控制台承担设置、状态、调试、异常处理。</text>
    <text x="28" y="106" class="body">4. 用户主路径：点小按钮开始 → 看字幕 → 悬停微调 → 点 ↗ 看控制台 → 停止回到小入口。</text>
  </g>
</svg>
