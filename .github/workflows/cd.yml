name: CD

on:
  workflow_dispatch:
    inputs:
      deploy_web:
        description: Deploy Flutter web to GitHub Pages
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "release-*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release-server:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: verba-linux-amd64
            package: verba-linux-amd64
          - os: windows-latest
            artifact: verba-windows-amd64.exe
            package: verba-windows-amd64.exe
          - os: macos-latest
            artifact: verba-darwin-amd64
            package: verba-darwin-amd64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: install Linux audio dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - name: build server
        run: go build -o ${{ matrix.artifact }} ./cmd/verba
      - name: upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: server/${{ matrix.artifact }}

  create-release:
    needs: release-server
    runs-on: ubuntu-latest
    steps:
      - name: download server artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/verba-linux-amd64/verba-linux-amd64
            dist/verba-windows-amd64.exe/verba-windows-amd64.exe
            dist/verba-darwin-amd64/verba-darwin-amd64
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('release-{0}', github.run_id) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-web:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_web == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.x"
          channel: stable
      - name: flutter pub get
        run: flutter pub get
      - name: flutter build web
        run: flutter build web --base-href /Verba-/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: client/build/web
      - id: deployment
        uses: actions/deploy-pages@v4
